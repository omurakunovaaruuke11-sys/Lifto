<!-- Прогресс -->
        <section id="stats">
            <h2>Прогресс</h2>
            <p id="stats-info">0 выполнено из 0</p>
            <div class="progress-bar">
                <div id="progress-fill"></div>
            </div>
        </section>

        <!-- Челлендж дня -->
        <section id="challenges">
            <h2>Челлендж дня 💪</h2>
            <p id="challenge-text">Выполни 5 минут растяжки!</p>
            <button onclick="newChallenge()">Новый челлендж</button>
        </section>
    </main>

    <script>
        let goals = [];

        function addGoal() {
            const input = document.getElementById("goal-input");
            const text = input.value.trim();
            if(text === "") return;
            goals.push({ text:text, done:false });
            input.value="";
            renderGoals();
            updateProgress();
        }

        function renderGoals() {
            const list = document.getElementById("goal-list");
            list.innerHTML = "";
            goals.forEach((goal,index)=>{
                const item = document.createElement("li");
                item.innerText = goal.text;
                if(goal.done) item.classList.add("completed");
                item.addEventListener("click",()=>toggleDone(index));
                list.appendChild(item);
            });
        }

        function toggleDone(index){
            goals[index].done = !goals[index].done;
            renderGoals();
            updateProgress();
        }

        function updateProgress(){
            const stats = document.getElementById("stats-info");
            const fill = document.getElementById("progress-fill");
            const doneCount = goals.filter(g=>g.done).length;
            const total = goals.length;
            stats.innerText = ${doneCount} выполнено из ${total};
            const percent = total===0?0:(doneCount/total)*100;
            fill.style.width = percent + "%";
        }

        // Челленджи
        const challenges = [
            "Выполни 5 минут растяжки!",
            "Выучи 5 новых слов на английском!",
            "Пей воду в течение часа!",
            "Напиши 3 вещи, за которые благодарен сегодня!",
            "Сделай 10 приседаний!"
        ];

        function newChallenge(){
            const idx = Math.floor(Math.random()*challenges.length);
            document.getElementById("challenge-text").innerText = challenges[idx];
        }
    </script>
</body>
</html>
