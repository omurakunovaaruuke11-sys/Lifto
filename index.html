<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 Дорамы и Корейский</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&family=Poppins:wght@400;600&display=swap');

        body {
            font-family: 'Poppins', 'Noto Sans KR', sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 40%, #a1c4fd 70%, #c2e9fb 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            color: #333;
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            color: #ff3366;
            text-shadow: 0 4px 15px rgba(255, 51, 102, 0.3);
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.3rem;
            color: #555;
            margin-bottom: 30px;
            opacity: 0.9;
        }

        .section {
            background: rgba(255, 255, 255, 0.95);
            padding: 35px 25px;
            margin: 25px auto;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            max-width: 650px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .section:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 40px rgba(255, 51, 102, 0.2);
        }

        h2 {
            color: #ff3366;
            font-size: 1.8rem;
            margin-bottom: 20px;
            position: relative;
        }

        h2::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 4px;
            background: linear-gradient(to right, #ff3366, #66ccff);
            border-radius: 2px;
        }

        .drama-item {
            margin: 20px 0;
            padding: 15px;
            background: #fff0f5;
            border-radius: 15px;
            transition: all 0.3s ease;
        }

        .drama-item:hover {
            background: #ffe6f0;
            transform: scale(1.03);
        }

        button {
            padding: 14px 28px;
            margin: 12px 8px;
            border: none;
            border-radius: 50px;
            background: linear-gradient(45deg, #ff3366, #ff6699);
            color: white;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            box-shadow: 0 6px 20px rgba(255, 51, 102, 0.3);
            transition: all 0.3s ease;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(255, 51, 102, 0.4);
            background: linear-gradient(45deg, #ff6699, #ff3366);
        }

        #korean-word {
            font-size: 2.2rem;
            margin: 25px auto;
            padding: 25px;
            background: linear-gradient(135deg, #fff0f5, #f0f8ff);
            border-radius: 20px;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            box-shadow: inset 0 4px 15px rgba(0,0,0,0.05);
            border: 3px solid #ff99cc;
        }

        .korean {
            font-size: 2.8rem;
            font-weight: 700;
            color: #ff3366;
            margin-bottom: 8px;
            font-family: 'Noto Sans KR', sans-serif;
        }

        .meaning {
            font-size: 1.3rem;
            color: #555;
            font-weight: 500;
        }

        .heart {
            display: inline-block;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
    </style>
</head>
<body>

    <h1>🎬 До́рамы и Корейский <span class="heart">💗</span></h1>
    <p class="subtitle">Любимые дорамы • Учим корейский с удовольствием</p>

    <div class="section">
        <h2>🔥 Популярные дорамы</h2>
        
        <div class="drama-item">
            <p><strong>Аварийная посадка на вас</strong></p>
            <button onclick="window.open('https://www.youtube.com/watch?v=KX8iPjJt0Uk', '_blank')">
                ▶ Смотреть трейлер
            </button>
        </div>

        <div class="drama-item">
            <p><strong>Итэвон класс</strong></p>
            <button onclick="window.open('https://www.youtube.com/watch?v=1LAQm8jJh9c', '_blank')">
                ▶ Смотреть трейлер
            </button>
        </div>
    </div>

    <div class="section">
        <h2>🇰🇷 Учим корейский</h2>
        <button onclick="newWord()">Новое слово ✨</button>
        <div id="korean-word">
            Нажми кнопку, чтобы узнать новое слово!
        </div>
    </div>

    <script>
        const words = [
            { korean: "안녕하세요", meaning: "Здравствуйте / Привет" },
            { korean: "감사합니다", meaning: "Спасибо" },
            { korean: "사랑해요", meaning: "Я тебя люблю" },
            { korean: "좋아요", meaning: "Хорошо / Классно / Нравится" },
            { korean: "배고파요", meaning: "Я голоден" },
            { korean: "미안해요", meaning: "Извини / Прости" },
            { korean: "예쁘다", meaning: "Красивая" },
            { korean: "오빠", meaning: "Старший брат (для девушки)" }
        ];

        function newWord() {
            const random = Math.floor(Math.random() * words.length);
            const word = words[random];
            
            document.getElementById("korean-word").innerHTML = `
                <div class="korean">${word.korean}</div>
                <div class="meaning">${word.meaning}</div>
            `;
        }
    </script>

</body>
</html>
